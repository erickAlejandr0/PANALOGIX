name: Deploy to Droplets

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy-web01:
    runs-on: ubuntu-latest
    steps:
      - name: Build y restart en web-01
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_1_IP }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /var/www/app
            git pull origin main
            npm ci
            npm run build
            sudo systemctl restart nextjs

  sync-to-web02:
    needs: build-and-deploy-web01
    runs-on: ubuntu-latest
    steps:
      - name: Configurar llave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DROPLET_1_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.DROPLET_2_IP }} >> ~/.ssh/known_hosts

      - name: Actualizar código y dependencias en web-02 (fijado al commit exacto de este run, no al último de main)
        run: |
          ssh -i ~/.ssh/deploy_key deploy@${{ secrets.DROPLET_2_IP }} "cd /var/www/app && git fetch origin main && git reset --hard ${{ github.sha }} && npm ci --omit=dev"

      - name: Borrar build viejo en web-02 antes de copiar (evita que scp anide la carpeta)
        run: |
          ssh -i ~/.ssh/deploy_key deploy@${{ secrets.DROPLET_2_IP }} "rm -rf /var/www/app/.next /var/www/app/public"

      - name: Copiar el build de web-01 a web-02 (sin recompilar, vía tar para manejar symlinks bien)
        run: |
          ssh -i ~/.ssh/deploy_key deploy@${{ secrets.DROPLET_1_IP }} "cd /var/www/app && tar czf - .next public" | ssh -i ~/.ssh/deploy_key deploy@${{ secrets.DROPLET_2_IP }} "cd /var/www/app && tar xzf -"

      - name: Reiniciar web-02
        run: |
          ssh -i ~/.ssh/deploy_key deploy@${{ secrets.DROPLET_2_IP }} "sudo systemctl restart nextjs"